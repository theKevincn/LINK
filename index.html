<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ========================================
        EDIT LINKS HERE
        ========================================
        */
        :root {
            --profile-name: "Navin Chaudhary";
            --bio-text: "Aspiring Surgeon | Future AIIMS Resident 🩺";
            --profile-image: "https://via.placeholder.com/150";
            --password-required: true;
            --correct-password: "700"; /* Set your password here */
            
            /* Links Configuration */
            --link-1-text: "📚 My Books"; --link-1-url: "https://example.com/books";
            --link-2-text: "✈️ Join Telegram"; --link-2-url: "https://t.me/example";
            --link-3-text: "📸 Instagram"; --link-3-url: "https://instagram.com/example";
            --link-4-text: "🎥 YouTube"; --link-4-url: "https://youtube.com/example";
            --link-5-text: "📈 Trading Referral"; --link-5-url: "https://example.com/referral";
            --link-6-text: "🌐 Website"; --link-6-url: "https://example.com";
            --link-7-text: "📧 Contact Me"; --link-7-url: "mailto:hello@example.com";
            
            /* Copy Link Configuration */
            --copy-link-text: "📋 Copy Referral Code";
            --copy-value: "REF-2026-NEET";
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Fade-in Animation */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Password Overlay */
        #password-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #password-overlay.hidden {
            display: none;
        }

        input[type="password"] {
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        /* Glassmorphism Card */
        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            display: none; /* Shown after auth */
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        p.bio { font-size: 15px; color: #94a3b8; margin-bottom: 30px; line-height: 1.5; }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 15px;
            font-weight: 400;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Copy Button Special Styling */
        .copy-btn {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            margin-top: 10px;
        }
        
        .copy-btn:hover {
            filter: brightness(1.1);
        }

        /* Alert Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="password-overlay">
        <h2 style="margin-bottom: 20px;">🔒 Protected Page</h2>
        <input type="password" id="pass-input" placeholder="Enter password">
        <button onclick="checkPassword()" class="link-btn" style="width: 150px; padding: 10px;">Unlock</button>
    </div>

    <div class="container fade-in" id="main-content">
        <img src="" alt="Profile" class="profile-img" id="p-img">
        <h1 id="p-name"></h1>
        <p class="bio" id="p-bio"></p>

        <div class="links-wrapper" id="links-container">
            </div>

        <div id="toast">Copied to clipboard!</div>
    </div>

    <script>
        const root = getComputedStyle(document.documentElement);
        
        // Initialize Content
        function init() {
            document.getElementById('p-img').src = root.getPropertyValue('--profile-image').trim().replace(/"/g, '');
            document.getElementById('p-name').textContent = root.getPropertyValue('--profile-name').trim().replace(/"/g, '');
            document.getElementById('p-bio').textContent = root.getPropertyValue('--bio-text').trim().replace(/"/g, '');

            const container = document.getElementById('links-container');
            
            // Build Links
            for(let i=1; i<=7; i++) {
                const text = root.getPropertyValue(`--link-${i}-text`).trim().replace(/"/g, '');
                const url = root.getPropertyValue(`--link-${i}-url`).trim().replace(/"/g, '');
                
                if(text && url) {
                    const a = document.createElement('a');
                    a.className = 'link-btn';
                    a.href = url;
                    a.target = '_blank';
                    a.textContent = text;
                    container.appendChild(a);
                }
            }

            // Build Copy Button
            const copyText = root.getPropertyValue('--copy-link-text').trim().replace(/"/g, '');
            if(copyText) {
                const btn = document.createElement('button');
                btn.className = 'link-btn copy-btn';
                btn.textContent = copyText;
                btn.onclick = copyToClipboard;
                container.appendChild(btn);
            }

            // Check if password is required
            const needsPass = root.getPropertyValue('--password-required').trim() === 'true';
            if(!needsPass) {
                document.getElementById('password-overlay').classList.add('hidden');
                document.getElementById('main-content').style.display = 'block';
            }
        }

        function checkPassword() {
            const input = document.getElementById('pass-input').value;
            const correct = root.getPropertyValue('--correct-password').trim().replace(/"/g, '');
            
            if(input === correct) {
                document.getElementById('password-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('password-overlay').classList.add('hidden');
                    document.getElementById('main-content').style.display = 'block';
                }, 500);
            } else {
                alert("Incorrect password!");
            }
        }

        function copyToClipboard() {
            const val = root.getPropertyValue('--copy-value').trim().replace(/"/g, '');
            navigator.clipboard.writeText(val);
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        // Allow 'Enter' key for password
        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        init();
    </script>
</body>
</html>
